# detekt 静态分析配置文件
# 基于默认配置构建（buildUponDefaultConfig: true），覆盖部分规则

style:
  # 允许魔术数字（Minecraft 领域常见）
  MagicNumber:
    active: false
  # CLI Main.kt 使用 wildcard import（picocli 和 world 包）
  WildcardImport:
    active: false
  # 允许在测试代码中使用未使用参数
  UnusedPrivateMember:
    active: true
    excludes: ['**/test/**', '**/testFixtures/**']
  # NoopSink 接口有意使用空的默认实现
  # DimensionProcessor 核心函数返回多个 return 是既有模式
  ReturnCount:
    active: true
    max: 5
  # DimensionProcessor 的 unused 参数是接口契约所需
  UnusedParameter:
    active: false

potential-bugs:
  # Report.kt String.format 用于 hex 编码（locale 无关）
  ImplicitDefaultLocale:
    active: false

empty-blocks:
  # NoopSink 接口默认实现有意为空
  EmptyFunctionBlock:
    active: false

complexity:
  # 核心引擎和 CLI 入口方法较长（call() ~200行, processSingleRegion ~170行）
  LongMethod:
    active: true
    threshold: 200
  # CLI Main.call() 含大量 when 分支（圈复杂度 ~46）
  CyclomaticComplexMethod:
    active: true
    threshold: 50
  # DimensionProcessor 和 CLI 有较深嵌套
  NestedBlockDepth:
    active: true
    threshold: 10
  # 允许较多的类方法 — FileSystem 接口 14 个，RealFileSystem/DefaultOptimizer 13-14 个
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 15
    thresholdInObjects: 15
  # 核心引擎函数参数较多（context 模式），提高阈值
  LongParameterList:
    active: true
    functionThreshold: 20
    constructorThreshold: 10

naming:
  # CLI 入口 Main.companion.main() 是标准 Kotlin 入口签名
  MemberNameEqualsClassName:
    active: false

performance:
  # picocli CommandLine.execute(*args) 是标准用法，spread operator 必然
  SpreadOperator:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  # Optimizer 有意吞部分异常（非关键路径不中断流程）
  SwallowedException:
    active: false

comments:
  # 允许缺少注释
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false
