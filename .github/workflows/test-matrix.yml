name: test-matrix

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  ubuntu-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21', '25' ]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Run tests on ${{ matrix.java }}
        run: ./gradlew :core:test :app:test --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-ubuntu-${{ matrix.java }}
          path: |
            core/build/reports/tests/
            app/build/reports/tests/
  windows-tests:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21', '25' ]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Run tests on Windows Java ${{ matrix.java }}
        shell: pwsh
        run: .\gradlew.bat :core:test :app:test --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-windows-${{ matrix.java }}
          path: |
            core/build/reports/tests/
            app/build/reports/tests/
  macos-tests:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21', '25' ]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Run tests on macOS Java ${{ matrix.java }}
        run: ./gradlew :core:test :app:test --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-macos-${{ matrix.java }}
          path: |
            core/build/reports/tests/
            app/build/reports/tests/
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Run tests with coverage
        run: ./gradlew :core:koverXmlReport --no-daemon
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: core/build/reports/kover/
